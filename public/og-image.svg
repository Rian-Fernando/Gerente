<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Gerente — Focused task manager">
  <title>Gerente — Focused task manager</title>

  <!-- Paper background -->
  <rect width="1200" height="630" fill="#F4F1EC"/>

  <!-- Soft coral accent orbs (matches in-app backdrop) -->
  <circle cx="120" cy="120" r="260" fill="#E25A3C" fill-opacity="0.10"/>
  <circle cx="1080" cy="560" r="240" fill="#E25A3C" fill-opacity="0.08"/>

  <!-- Pivot mark, anchored bottom-left of the headline -->
  <g transform="translate(96, 156) scale(1.05)">
    <path d="M40 40 H110 V60 H60 V150 H40 Z" fill="#111114"/>
    <path d="M160 160 H90 V140 H140 V50 H160 Z" fill="#111114"/>
    <rect x="92" y="92" width="16" height="16" fill="#E25A3C"/>
  </g>

  <!-- Wordmark -->
  <text x="346" y="298"
        font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
        font-size="124" font-weight="700" letter-spacing="-5"
        fill="#111114">Gerente</text>

  <!-- Tagline -->
  <text x="98" y="430"
        font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
        font-size="44" font-weight="500" letter-spacing="-1"
        fill="#5b5b62">A focused task manager with workspaces,</text>
  <text x="98" y="486"
        font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
        font-size="44" font-weight="500" letter-spacing="-1"
        fill="#5b5b62">priorities, and a built-in Pomodoro timer.</text>

  <!-- Author byline -->
  <text x="98" y="568"
        font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
        font-size="22" font-weight="600" letter-spacing="2"
        fill="#86868b" text-transform="uppercase">BUILT BY RIAN FERNANDO</text>
</svg>
